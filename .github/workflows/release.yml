name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and test
        run: |
          swift --version
          swift build -c release
          swift test -c release

      - name: Compute next version tag
        id: semver
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag -l 'v*' --sort=-version:refname | head -n 1)"

          if [[ -z "$latest_tag" ]]; then
            next_tag="v0.1.0"
          else
            current="${latest_tag#v}"

            if [[ ! "$current" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Latest tag is not SemVer: $latest_tag"
              exit 1
            fi

            IFS='.' read -r major minor patch <<< "$current"
            patch=$((patch + 1))
            next_tag="v${major}.${minor}.${patch}"
          fi

          if git rev-parse "$next_tag" >/dev/null 2>&1; then
            echo "Tag already exists: $next_tag"
            exit 1
          fi

          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${{ steps.semver.outputs.next_tag }}" -m "Release ${{ steps.semver.outputs.next_tag }}"
          git push origin "${{ steps.semver.outputs.next_tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.next_tag }}
          generate_release_notes: true
